services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: recommendation
      POSTGRES_USER: recommendation
      POSTGRES_PASSWORD: recommendation
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  recommendation-api:
    build: .
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recommendation
      SPRING_DATASOURCE_USERNAME: recommendation
      SPRING_DATASOURCE_PASSWORD: recommendation
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-http://localhost:8081}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://localhost:8081}
    depends_on:
      - postgres

volumes:
  postgres_data:
