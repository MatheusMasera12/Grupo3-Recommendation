spring.application.name=recommendation

spring.datasource.url=jdbc:postgresql://localhost:5433/recommendation
spring.datasource.username=${POSTGRES_USER:recommendation}
spring.datasource.password=${POSTGRES_PASSWORD:recommendation}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${auth.service.url}/.well-known/jwks.json
