spring.application.name=recommendation

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:recommendation}
spring.datasource.username=${POSTGRES_USER:recommendation}
spring.datasource.password=${POSTGRES_PASSWORD:recommendation}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

auth.service.url=${AUTH_SERVICE_URL:http://localhost:3001}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:${auth.service.url}}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI:${auth.service.url}/.well-known/jwks.json}

spring.flyway.enabled=true

spring.docker.compose.enabled=false
