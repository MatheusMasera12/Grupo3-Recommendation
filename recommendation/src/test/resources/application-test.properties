spring.application.name=recommendation-test

# As propriedades de datasource e Redis SAO sobrescritas dinamicamente pelo
# AbstractIntegrationTest (via @DynamicPropertySource), apontando para os
# containers do Testcontainers. Os valores abaixo sao apenas fallback/clareza.

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.docker.compose.enabled=false

# Issuer/JWK reais sao desligados nos testes de integracao via
# @TestPropertySource em RecommendationFlowIT, que tambem substitui o
# JwtDecoder por uma versao de teste (TestJwtConfig).
