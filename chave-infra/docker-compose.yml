services:
  ministack:
    image: ministackorg/ministack
    container_name: ministack
    ports:
      - "4567:4566"
    environment:
      - SERVICES=s3,rds,apigateway,sts
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ministack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  infra-provisioner:
    image: hashicorp/terraform:latest
    container_name: infra-provisioner
    working_dir: /infra
    volumes:
      - ./terraform:/infra
    environment:
      - TF_VAR_endpoint=http://ministack:4566
      - TF_VAR_db_name=${DB_NAME:-chave_auth}
      - TF_VAR_db_user=${DB_USER:-chave}
      - TF_VAR_db_password=${DB_PASSWORD:-chave_secret}
      - TF_VAR_ms_auth_port=${MS_AUTH_PORT:-3001}
    entrypoint: ["/bin/sh", "-c", "terraform init && terraform apply -auto-approve"]
    depends_on:
      ministack:
        condition: service_healthy

  chave-ms-auth:
    build:
      context: ../chave-ms-auth
      dockerfile: Dockerfile
    container_name: chave-ms-auth
    # Contorno para o bug do Grupo 7: O Dockerfile deles nĂŁo instala o TypeScript (omit=dev),
    # entĂŁo o npm start quebra. Injetamos o npm install aqui para garantir que o tsc exista.
    command: sh -c "npm install && npm start"
    ports:
      - "${MS_AUTH_PORT:-3001}:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped

  chave-mfe-auth:
    build:
      context: ../chave-mfe-auth
      dockerfile: Dockerfile
    container_name: chave-mfe-auth
    ports:
      - "4010:4001"
    environment:
      - VITE_MS_AUTH_URL=http://localhost:3001
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped

  chave-shell:
    build:
      context: ../chave-shell
      dockerfile: Dockerfile
      args:
        - MFE_AUTH_URL=http://localhost:4010/assets/remoteEntry.js
    container_name: chave-shell
    ports:
      - "3010:3000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ENDPOINT=http://ministack:4566
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
      chave-mfe-auth:
        condition: service_started
    restart: unless-stopped


  postgres-recommendation:
    image: postgres:16
    container_name: postgres-recommendation
    environment:
      POSTGRES_DB: chave_recommendation
      POSTGRES_USER: chave
      POSTGRES_PASSWORD: chave_secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_recommendation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chave -d chave_recommendation"]
      interval: 5s
      timeout: 5s
      retries: 10

  chave-ms-recommendation:
    build:
      context: ../recommendation
      dockerfile: Dockerfile
    container_name: chave-ms-recommendation
    ports:
      - "8090:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-recommendation:5432/chave_recommendation
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-chave}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-chave_secret}
      - AWS_ENDPOINT=http://ministack:4566
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      postgres-recommendation:
        condition: service_healthy
    restart: unless-stopped


  recommendation-mfe:
    build:
      context: ../recommendation-mfe
      dockerfile: Dockerfile
    container_name: recommendation-mfe
    ports:
      - "5173:5173"
    depends_on:
      infra-provisioner:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ministack_data:
  postgres_recommendation_data:
